                        type: integer
                      needs_review:
                        type: integer
                  agents:
                    type: integer
                  events:
                    type: integer
                  runs:
                    type: integer
                  projects:
                    type: integer
                  active_leases:
                    type: integer
                  automation_circuit:
                    type: string
                    enum: [closed, open, unknown]

  /api/v2/status:
    get:
      tags:
        - health
      summary: Server status overview
      description: Returns combined server status including version, schema version, uptime, and counts of active projects, leases, and runs.
      operationId: getStatus
      responses:
        '200':
          description: Server status
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                  schema_version:
                    type: integer
                  db_path:
                    type: string
                  active_projects:
                    type: integer
                  active_leases:
                    type: integer
                  active_runs:
                    type: integer
                  uptime_seconds:
                    type: integer
                  uptime:
                    type: string
                  server_start:
                    type: string
                    format: date-time

  /api/v2/projects/import:
    post:
      tags:
        - backup
      summary: Import project archive
      description: Imports a previously exported project archive, creating a new project with all tasks, runs, memory, policies, and events.
      operationId: importProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                schema_version:
                  type: integer
                exported_at:
                  type: string
                  format: date-time
                project:
                  $ref: '#/components/schemas/Project'
                tasks:
                  type: array
                  items:
                    $ref: '#/components/schemas/TaskV2'
                runs:
                  type: array
                  items:
                    $ref: '#/components/schemas/Run'
                memory:
                  type: array
                  items:
                    $ref: '#/components/schemas/Memory'
                policies:
                  type: array
                  items:
                    $ref: '#/components/schemas/Policy'
                events:
                  type: array
                  items:
                    $ref: '#/components/schemas/Event'
              required:
                - project
      responses:
        '200':
          description: Import result
          content:
            application/json:
              schema:
                type: object
                properties:
                  project_id:
                    type: string
                  tasks_imported:
                    type: integer
                  runs_imported:
                    type: integer
                  memory_imported:
                    type: integer
                  policies_imported:
                    type: integer
                  events_imported:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v2/audit:
    get:
      tags:
        - audit
      summary: Global audit events
      description: Returns audit.* events across all projects with filters for type, project, since, limit, and offset.
      operationId: listGlobalAuditEvents
      parameters:
        - name: type
          in: query
          schema:
            type: string
          description: Event kind filter (e.g. audit.policy.changed). Defaults to all audit.* events.
        - name: project_id
          in: query
          schema:
            type: string
          description: Filter by project ID
        - name: since
          in: query
          schema:
            type: string
            format: date-time
          description: Only return events after this timestamp
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 500
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Audit events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/Event'
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer

  /api/v2/projects/{projectId}/dashboard:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
    get:
      tags:
        - projects
      summary: Project dashboard
      description: |
        Returns a comprehensive project overview including task counts by status bucket,
        active runs, active agents, recent repo changes, recent failures, automation events,
        multi-signal recommendations with "why" explanations, and stalled tasks.
      operationId: getProjectDashboard
      responses:
        '200':
          description: Dashboard projection
          content:
            application/json:
              schema:
                type: object
                properties:
                  project_id:
                    type: string
                  task_counts:
                    type: object
                    properties:
                      queued:
                        type: integer
                      in_progress:
                        type: integer
                      completed:
                        type: integer
                      failed:
                        type: integer
                  active_runs:
                    type: array
                    items:
                      type: object
                      properties:
                        run_id:
                          type: string
                        task_title:
                          type: string
                        status:
                          type: string
                        started_at:
                          type: string
                  recent_changes:
                    type: array
                    items:
                      type: object
                      properties:
                        path:
                          type: string
                        updated_at:
                          type: string
                  recent_failures:
                    type: array
                    items:
                      type: object
                      properties:
                        task_id:
                          type: integer
                        title:
                          type: string
                        error:
                          type: string
                        updated_at:
                          type: string
                  automation_events:
                    type: array
                    items:
                      type: object
                      properties:
                        kind:
                          type: string
                        created_at:
                          type: string
                  recommendations:
                    type: array
                    items:
                      type: object
                      properties:
                        task_id:
                          type: integer
                        title:
                          type: string
                        priority:
                          type: integer
                        type:
                          type: string
                        why:
                          type: string
                  stalled_tasks:
                    type: array
                    items:
                      type: object
                      properties:
                        task_id:
                          type: integer
                        title:
                          type: string
                        status:
                          type: string
                        agent_id:
                          type: string
                        claimed_at:
                          type: string
                        reason:
                          type: string
                  active_agents:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        status:
                          type: string
                        last_heartbeat:
                          type: string
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v2/artifacts/{artifactId}/comments:
    parameters:
      - name: artifactId
        in: path
        required: true
        schema:
          type: string
    get:
      tags:
        - runs
      summary: List artifact comments
      description: Returns comments attached to an artifact.
      operationId: listArtifactComments
      responses:
        '200':
          description: Artifact comments
          content:
            application/json:
              schema:
                type: object
                properties:
                  comments:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        body:
                          type: string
                        author:
                          type: string
                        created_at:
                          type: string
    post:
      tags:
        - runs
      summary: Add artifact comment
      description: Adds a comment to an artifact.
      operationId: addArtifactComment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                body:
                  type: string
                author:
                  type: string
              required:
                - body
      responses:
        '201':
          description: Comment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  body:
                    type: string
                  author:
                    type: string
                  created_at:
                    type: string
