name: Build VSIX Extension
on:
  push:
    tags: ['vsix-v*']
  pull_request:
    paths: ['tools/cocopilot-vsix/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/cocopilot-vsix
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run compile
      - run: npx @vscode/vsce package -o dist/cocopilot-vsix.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: cocopilot-vsix
          path: tools/cocopilot-vsix/dist/cocopilot-vsix.vsix
