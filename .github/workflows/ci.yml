name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  go:
    name: Go Build, Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race -count=1 ./...
      - name: Smoke, contract, and integration tests
        run: go test -run "TestSmoke|TestContract|TestIntegration" -count=1 -timeout 60s ./server/
      - name: Verify no test artifacts leaked
        run: |
          if ls test_*.db 2>/dev/null | grep -q .; then
            echo "ERROR: Test DB files leaked to repo root"
            ls test_*.db
            exit 1
          fi
      - name: Scan for secrets
        run: |
          FOUND=0
          if grep -rl "PRIVATE KEY" --include='*.go' --include='*.json' --include='*.yaml' --include='*.yml' --include='*.md' . 2>/dev/null | grep -v vendor/ | grep -v node_modules/; then
            echo "WARNING: Files containing 'PRIVATE KEY' found"
            FOUND=1
          fi
          if grep -rn 'sk-[a-zA-Z0-9]\{20,\}\|ghp_[a-zA-Z0-9]\{36\}\|AKIA[A-Z0-9]\{16\}' --include='*.go' . 2>/dev/null | grep -v '_test.go' | grep -v vendor/; then
            echo "WARNING: Potential hardcoded secrets found"
            FOUND=1
          fi
          if [ "$FOUND" -eq 1 ]; then
            echo "ERROR: Secret scanning found potential issues"
            exit 1
          fi
      - name: Validate OpenAPI spec syntax
        run: |
          python3 -c "
          import yaml, sys
          with open('docs/api/openapi-v2.yaml') as f:
              spec = yaml.safe_load(f)
          assert spec.get('openapi'), 'Missing openapi version field'
          assert spec.get('info'), 'Missing info field'
          assert spec.get('paths'), 'Missing paths field'
          print(f'OpenAPI spec valid: {len(spec[\"paths\"])} paths defined')
          "

  node-mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: 'tools/cocopilot-mcp/package-lock.json' }
      - run: npm ci
        working-directory: tools/cocopilot-mcp
      - run: npm run build
        working-directory: tools/cocopilot-mcp

  node-vsix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: 'tools/cocopilot-vsix/package-lock.json' }
      - run: npm ci
        working-directory: tools/cocopilot-vsix
      - run: npm run compile
        working-directory: tools/cocopilot-vsix
      - run: npx @vscode/vsce package -o dist/cocopilot-vsix.vsix
        working-directory: tools/cocopilot-vsix
      - uses: actions/upload-artifact@v4
        with:
          name: cocopilot-vsix
          path: tools/cocopilot-vsix/dist/cocopilot-vsix.vsix

  artifact-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for forbidden artifacts
        run: |
          failed=0
          if find . -name "*.db" -o -name "*.db-wal" -o -name "*.db-shm" | grep -v "^./.git" | grep -q .; then
            echo "ERROR: Runtime DB artifacts found in repo"
            failed=1
          fi
          if find . -name ".DS_Store" | grep -v "^./.git" | grep -q .; then
            echo "ERROR: .DS_Store files found in repo"
            failed=1
          fi
          if find . -type d -name "__MACOSX" | grep -v "^./.git" | grep -q .; then
            echo "ERROR: __MACOSX directories found in repo"
            failed=1
          fi
          if find . -name "coverage.out" | grep -v "^./.git" | grep -q .; then
            echo "ERROR: coverage.out files found in repo"
            failed=1
          fi
          if find . -name "*.zip" | grep -v "^./.git" | grep -v node_modules | grep -q .; then
            echo "ERROR: Archive files (*.zip) found in repo"
            failed=1
          fi
          exit $failed

  release-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build release zip
        run: bash scripts/package.sh
      - name: Validate release zip contents
        run: |
          VERIFY_DIR=$(mktemp -d)
          unzip -q dist/cocopilot-release.zip -d "$VERIFY_DIR"
          failed=0
          if find "$VERIFY_DIR" -type d -name ".git" | grep -q .; then
            echo "ERROR: .git/ directory found in release zip"
            failed=1
          fi
          if find "$VERIFY_DIR" -type d -name "__MACOSX" | grep -q .; then
            echo "ERROR: __MACOSX/ directory found in release zip"
            failed=1
          fi
          if find "$VERIFY_DIR" -name ".DS_Store" | grep -q .; then
            echo "ERROR: .DS_Store found in release zip"
            failed=1
          fi
          if find "$VERIFY_DIR" -name "tasks.db*" | grep -q .; then
            echo "ERROR: tasks.db artifacts found in release zip"
            failed=1
          fi
          if find "$VERIFY_DIR" -name "coverage.out" | grep -q .; then
            echo "ERROR: coverage.out found in release zip"
            failed=1
          fi
          rm -rf "$VERIFY_DIR"
          exit $failed

  contract-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check API contract drift
        run: bash tools/check-contract-drift.sh

  codegen-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run codegen and check for drift
        run: |
          go run tools/codegen/codegen.go
          if ! git diff --exit-code tools/shared/types.generated.ts tools/shared/client.generated.ts; then
            echo "ERROR: Generated files are out of date. Run 'go run tools/codegen/codegen.go' and commit."
            exit 1
          fi
