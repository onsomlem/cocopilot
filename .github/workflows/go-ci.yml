name: Go CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: go build -o /dev/null ./cmd/cocopilot

      - name: Vet
        run: go vet ./...

      - name: Test with race detection
        run: go test -race -count=1 ./...

      - name: Verify no test artifacts leaked
        run: |
          if ls test_*.db 2>/dev/null | grep -q .; then
            echo "ERROR: Test DB files leaked to repo root"
            ls test_*.db
            exit 1
          fi
          echo "No test artifacts leaked"

      - name: Scan for secrets
        run: |
          FOUND=0
          # Check for private keys
          if grep -rl "PRIVATE KEY" --include='*.go' --include='*.json' --include='*.yaml' --include='*.yml' --include='*.md' . 2>/dev/null | grep -v vendor/ | grep -v node_modules/; then
            echo "WARNING: Files containing 'PRIVATE KEY' found"
            FOUND=1
          fi
          # Check for hardcoded API keys/tokens (common patterns)
          if grep -rn 'sk-[a-zA-Z0-9]\{20,\}\|ghp_[a-zA-Z0-9]\{36\}\|AKIA[A-Z0-9]\{16\}' --include='*.go' . 2>/dev/null | grep -v '_test.go' | grep -v vendor/; then
            echo "WARNING: Potential hardcoded secrets found"
            FOUND=1
          fi
          if [ "$FOUND" -eq 1 ]; then
            echo "ERROR: Secret scanning found potential issues"
            exit 1
          fi
          echo "No secrets detected"

      - name: Validate OpenAPI spec syntax
        run: |
          # Basic YAML validity check for the OpenAPI spec
          python3 -c "
          import yaml, sys
          with open('docs/api/openapi-v2.yaml') as f:
              spec = yaml.safe_load(f)
          assert spec.get('openapi'), 'Missing openapi version field'
          assert spec.get('info'), 'Missing info field'
          assert spec.get('paths'), 'Missing paths field'
          print(f'OpenAPI spec valid: {len(spec[\"paths\"])} paths defined')
          "
